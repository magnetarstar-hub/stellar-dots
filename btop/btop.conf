#? Config file for btop v1.3+
# Place at ~/.config/btop/btop.conf

color_theme = "nordic-pill"
theme_background = False
truecolor = True
force_tty = False

# rounded box borders for the "clean cyberpunk" look
rounded_corners = True

# 4-pane dashboard: CPU / mem+disks / net / process list
shown_boxes = "cpu mem net proc"

vim_keys = True
graph_symbol = "braille"
graph_symbol_cpu = "default"
graph_symbol_mem = "default"
graph_symbol_net = "default"
graph_symbol_proc = "default"

update_ms = 1500

proc_sorting = "cpu lazy"
proc_reversed = False
proc_tree = False
proc_colors = True
proc_gradient = True
proc_per_core = False
proc_mem_bytes = True
proc_cpu_graphs = True

cpu_graph_upper = "total"
cpu_graph_lower = "total"
cpu_invert_lower = True
cpu_single_graph = False
show_cpu_freq = True

mem_graphs = True
show_disks = True
show_io_stat = True
io_mode = False
disks_filter = ""

net_download = 100
net_upload = 100
net_auto = True
net_sync = True

show_battery = True
selected_battery = "Auto"

show_swap = True
swap_disk = True

clock_format = "%H:%M"
background_update = True
show_init = False
log_level = "WARNING"
