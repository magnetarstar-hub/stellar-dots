### ────────────────────────────────────────────────────────────
### Hyprland config — "Clean Cyberpunk / Nordic" rice
### ────────────────────────────────────────────────────────────

# ─── Monitor ───────────────────────────────────────────────────
monitor=,preferred,auto,1

# ─── Environment ───────────────────────────────────────────────
env = XCURSOR_THEME,Bibata-Modern-Classic
env = XCURSOR_SIZE,24
env = HYPRCURSOR_THEME,Bibata-Modern-Classic
env = HYPRCURSOR_SIZE,24
env = GTK_THEME,Nordic
env = QT_QPA_PLATFORMTHEME,qt5ct

# ─── Autostart ──────────────────────────────────────────────────
exec-once = waybar
exec-once = waypaper
exec-once = swaync                       # notifications
exec-once = fish -c "hyprctl setcursor Bibata-Modern-Classic 24"
exec-once = gnome-keyring-daemon --start --components=secrets
exec-once = wl-paste --watch cliphist store
exec-once = swayidle -w timeout 300 'swaylock -f' timeout 600 'hyprctl dispatch dpms off' resume 'hyprctl dispatch dpms on'

# ─── Input ──────────────────────────────────────────────────────
input {
    kb_layout = fr
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = true
        tap-to-click = true
   }
}

# ─── General ────────────────────────────────────────────────────
general {
    gaps_in = 5
    gaps_out = 12
    border_size = 2
    col.active_border   = rgba(88C0D0ee) rgba(B48EADee) 45deg   # teal -> dusty purple
    col.inactive_border = rgba(3B4252aa)
    layout = dwindle
    resize_on_border = true
    allow_tearing = false
}

# ─── Decoration (rounded corners + blur) ───────────────────────
decoration {
    rounding = 16

    active_opacity = 0.96
    inactive_opacity = 0.90
    fullscreen_opacity = 1.0

    blur {
        enabled = true
        size = 6
        passes = 3
        new_optimizations = true
        ignore_opacity = true
        xray = false
        vibrancy = 0.18
    }

    shadow {
        enabled = true
        range = 18
        render_power = 3
        color = rgba(00000099)
    }
}

# ─── Animations ─────────────────────────────────────────────────
animations {
    enabled = true

    bezier = softAcDc, 0.19, 1, 0.22, 1
    bezier = easeOutQuint, 0.23, 1, 0.32, 1

    animation = windows, 1, 4, easeOutQuint, popin 85%
    animation = windowsOut, 1, 4, easeOutQuint, popin 85%
    animation = border, 1, 8, softAcDc
    animation = borderangle, 1, 20, softAcDc, loop
    animation = fade, 1, 4, softAcDc
    animation = workspaces, 1, 5, easeOutQuint, slide
    animation = specialWorkspace, 1, 4, softAcDc, slidevert
}

# ─── Layout ─────────────────────────────────────────────────────
dwindle {
    preserve_split = true
    smart_split = false
}

master {
    new_status = master
}

# ─── Misc ───────────────────────────────────────────────────────
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    background_color = 0x0d0f14
}

# ─── Window rules ───────────────────────────────────────────────
windowrule = float on, match:class ^(pavucontrol)$
windowrule = float on, match:class ^(blueman-manager)$
windowrule = float on, match:class ^(nm-connection-editor)$
windowrule = float on, match:title ^(Picture-in-Picture)$
windowrule = pin on, match:title ^(Picture-in-Picture)$
windowrule = opacity 0.95 0.85, match:class ^(kitty)$
windowrule = opacity 0.95 0.90, match:class ^(thunar)$
windowrule = size 800 550, match:class ^(pavucontrol)$
windowrule = workspace special:magic, match:class ^(btop-scratch)$
layerrule = blur on, match:namespace waybar
layerrule = ignore_alpha 0, match:namespace waybar
layerrule = blur on, match:namespace notifications

# ─── Variables ──────────────────────────────────────────────────
$mainMod = SUPER
$terminal = kitty
$launcher = rofi -show drun -theme ~/.config/rofi/nordic-pill.rasi
$fileManager = thunar
$browser = brave

# ─── Keybinds ───────────────────────────────────────────────────
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, R, exec, $launcher
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, B, exec, $browser
bind = $mainMod, C, killactive
bind = $mainMod SHIFT, Q, exit
bind = $mainMod, V, togglefloating
bind = $mainMod, F, fullscreen
bind = $mainMod, P, pseudo
bind = $mainMod, J, layoutmsg, togglesplit
bind = $mainMod, L, exec, swaylock -f
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# focus movement
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d

# workspaces 1-9 (rendered as numbered pills in waybar)
bind = $mainMod, code:10, workspace, 1
bind = $mainMod, code:11, workspace, 2
bind = $mainMod, code:12, workspace, 3
bind = $mainMod, code:13, workspace, 4
bind = $mainMod, code:14, workspace, 5
bind = $mainMod, code:15, workspace, 6
bind = $mainMod, code:16, workspace, 7
bind = $mainMod, code:17, workspace, 8
bind = $mainMod, code:18, workspace, 9

bind = $mainMod SHIFT, code:10, movetoworkspace, 1
bind = $mainMod SHIFT, code:11, movetoworkspace, 2
bind = $mainMod SHIFT, code:12, movetoworkspace, 3
bind = $mainMod SHIFT, code:13, movetoworkspace, 4
bind = $mainMod SHIFT, code:14, movetoworkspace, 5
bind = $mainMod SHIFT, code:15, movetoworkspace, 6
bind = $mainMod SHIFT, code:16, movetoworkspace, 7
bind = $mainMod SHIFT, code:17, movetoworkspace, 8
bind = $mainMod SHIFT, code:18, movetoworkspace, 9

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# mouse move/resize windows
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# media / volume / brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl set 5%-
bindl = ,XF86AudioPlay, exec, playerctl play-pause
bindl = ,XF86AudioNext, exec, playerctl next
bindl = ,XF86AudioPrev, exec, playerctl previous

# screenshot
bind = , Print, exec, grim -g "$(slurp)" - | wl-copy
bind = $mainMod, Print, exec, grim - | wl-copy

# quick access to btop dashboard in a floating scratchpad terminal
bind = $mainMod, M, exec, kitty --class btop-scratch -e btop
