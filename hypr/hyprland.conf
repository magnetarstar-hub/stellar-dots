# #######################################################################################
# AUTOGENERATED HYPRLAND CONFIG.
# EDIT THIS CONFIG ACCORDING TO THE WIKI INSTRUCTIONS.
# #######################################################################################



# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hypr.land/Configuring/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf


################
### MONITORS ###
################

monitor = HDMI-A-1, 1920x1080@100, 0x0, 1

###################
### MY PROGRAMS ###
###################

$terminal    = kitty
$fileManager = dolphin
$menu = rofi -show drun -show-icons -theme ~/.config/rofi/launcher.rasi

#################
### AUTOSTART ###
#################

exec-once = swww-daemon
exec-once = waypaper --restore
exec-once = waybar
exec-once = swaync

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in  = 5
    gaps_out = 20

    border_size = 2

    col.active_border   = rgba(9000FFff) rgba(570099ff) 45deg
    col.inactive_border = rgba(3A0066aa)

    resize_on_border = true   # drag borders/gaps to resize

    allow_tearing = false

    layout = dwindle
}

decoration {
    rounding       = 10
    rounding_power = 2

    active_opacity   = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled      = true
        range        = 4
        render_power = 3
        color        = rgba(140024ee)
    }

    blur {
        enabled    = true
        size       = 8
        passes     = 2
        vibrancy   = 0.1696
    }
}

animations {
    enabled = yes, please :)

    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    animation = global,        1, 10,   default
    animation = border,        1, 5.39, easeOutQuint
    animation = windows,       1, 4.79, easeOutQuint
    animation = windowsIn,     1, 4.1,  easeOutQuint, popin 87%
    animation = windowsOut,    1, 1.49, linear,       popin 87%
    animation = fadeIn,        1, 1.73, almostLinear
    animation = fadeOut,       1, 1.46, almostLinear
    animation = fade,          1, 3.03, quick
    animation = layers,        1, 3.81, easeOutQuint
    animation = layersIn,      1, 4,    easeOutQuint, fade
    animation = layersOut,     1, 1.5,  linear,       fade
    animation = fadeLayersIn,  1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces,    1, 4, easeOutQuint, slide
    animation = workspacesIn,  1, 4, easeOutQuint, slide
    animation = workspacesOut, 1, 4, easeOutQuint, slide
    animation = zoomFactor,    1, 7,    quick
}

dwindle {
    pseudotile     = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = -1
    disable_hyprland_logo   = false
}

#############
### INPUT ###
#############

input {
    kb_layout  = fr,ara
    kb_variant =
    kb_model   = pc105
    kb_options = grp:alt_shift_toggle
    kb_rules   =

    follow_mouse = 1
    sensitivity  = 0

    touchpad {
        natural_scroll = false
    }
}

# 3-finger swipe to switch workspaces
# gestures {
#     workspace_swipe         = true
#     workspace_swipe_fingers = 3
# }

device {
    name        = epic-mouse-v1
    sensitivity = -0.5
}

###################
### KEYBINDINGS ###
###################

$mainMod = SUPER

bind = $mainMod,       Q, exec,            $terminal
bind = $mainMod,       C, killactive,
bind = $mainMod,       M, exec,            hyprctl dispatch exit
bind = $mainMod,       E, exec,            $fileManager
bind = $mainMod,       V, togglefloating,
bind = $mainMod,       R, exec,            $menu
bind = $mainMod,       P, pseudo,
bind = $mainMod,       J, layoutmsg,       togglesplit

# notification center 

bind = $mainMod, N, exec, swaync-client -t

bind = $mainMod, W, exec, pkill waypaper || waypaper
bind = $mainMod SHIFT, W, exec, waypaper --random

# Focus
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d

# Workspaces (FR keyboard layout)
bind = $mainMod, ampersand,  workspace, 1
bind = $mainMod, eacute,     workspace, 2
bind = $mainMod, quotedbl,   workspace, 3
bind = $mainMod, apostrophe, workspace, 4
bind = $mainMod, parenleft,  workspace, 5
bind = $mainMod, minus,      workspace, 6
bind = $mainMod, egrave,     workspace, 7
bind = $mainMod, underscore, workspace, 8
bind = $mainMod, ccedilla,   workspace, 9
bind = $mainMod, agrave,     workspace, 10

# Move window to workspace
bind = $mainMod SHIFT, ampersand,  movetoworkspace, 1
bind = $mainMod SHIFT, eacute,     movetoworkspace, 2
bind = $mainMod SHIFT, quotedbl,   movetoworkspace, 3
bind = $mainMod SHIFT, apostrophe, movetoworkspace, 4
bind = $mainMod SHIFT, parenleft,  movetoworkspace, 5
bind = $mainMod SHIFT, minus,      movetoworkspace, 6
bind = $mainMod SHIFT, egrave,     movetoworkspace, 7
bind = $mainMod SHIFT, underscore, movetoworkspace, 8
bind = $mainMod SHIFT, ccedilla,   movetoworkspace, 9
bind = $mainMod SHIFT, agrave,     movetoworkspace, 10

# Scratchpad
bind = $mainMod,       S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace,        special:magic

# Scroll workspaces
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up,   workspace, e-1

# Mouse move/resize
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# ── Resize Submap ──────────────────────────────
bind = $mainMod, F8, submap, resize

submap = resize

binde = , right, resizeactive,  30 0
binde = , left,  resizeactive, -30 0
binde = , up,    resizeactive,  0 -30
binde = , down,  resizeactive,  0  30

binde = SHIFT, right, resizeactive,  5 0
binde = SHIFT, left,  resizeactive, -5 0
binde = SHIFT, up,    resizeactive,  0 -5
binde = SHIFT, down,  resizeactive,  0  5

bind = , escape, submap, reset
bind = , return, submap, reset

submap = reset
# ───────────────────────────────────────────────

# Volume & Brightness
bindel = , XF86AudioRaiseVolume,  exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioMicMute,      exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = , XF86MonBrightnessUp,   exec, brightnessctl -e4 -n2 set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Media
bindl = , XF86AudioNext,  exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay,  exec, playerctl play-pause
bindl = , XF86AudioPrev,  exec, playerctl previous

# Screenshots
bind = , Print,          exec, grim -g "$(slurp -d)" - | swappy -f -
bind = $mainMod, Print,  exec, grim - | swappy -f -




##############################
### WINDOWS AND WORKSPACES ###
##############################

windowrule {
    name      = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

windowrule {
    name             = fix-xwayland-drags
    match:class      = ^$
    match:title      = ^$
    match:xwayland   = true
    match:float      = true
    match:fullscreen = false
    match:pin        = false
    no_focus         = true
}

windowrule {
    name        = move-hyprland-run
    match:class = hyprland-run
    move        = 20 monitor_h-120
    float       = yes
}


