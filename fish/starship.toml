# ─────────────────────────────────────────────────────────────
# starship.toml — Nordic clean-cyberpunk prompt
# Place at ~/.config/starship.toml
# ─────────────────────────────────────────────────────────────

format = """
[](fg:#88C0D0)[  $directory]($style)[](bg:#3B4252 fg:#88C0D0)[$git_branch$git_status]($style)[](fg:#3B4252)
[❯](bold fg:#8FBCBB) """

add_newline = true
palette = "nordic"

[palettes.nordic]
base    = "#2E3440"
surface = "#3B4252"
text    = "#E5E9F0"
teal    = "#8FBCBB"
frost   = "#88C0D0"
blue    = "#81A1C1"
red     = "#BF616A"
green   = "#A3BE8C"
yellow  = "#EBCB8B"
purple  = "#B48EAD"

[directory]
style = "bg:#88C0D0 fg:#2E3440 bold"
format = "[$path]($style)"
truncation_length = 3
truncate_to_repo = true
read_only = " 󰌾"

[git_branch]
style = "bg:#3B4252 fg:#88C0D0"
format = " [ $branch]($style)"

[git_status]
style = "bg:#3B4252 fg:#EBCB8B"
format = "[$all_status$ahead_behind ]($style)"
conflicted = "󰞇"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed = "󰆓"
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

[character]
success_symbol = "[❯](bold #8FBCBB)"
error_symbol = "[❯](bold #BF616A)"

[cmd_duration]
min_time = 2000
format = " [$duration]($style)"
style = "fg:#EBCB8B"

[nodejs]
symbol = " "
style = "fg:#A3BE8C"

[python]
symbol = " "
style = "fg:#EBCB8B"

[rust]
symbol = " "
style = "fg:#D08770"

[package]
symbol = " "
style = "fg:#B48EAD"

[docker_context]
symbol = " "
style = "fg:#81A1C1"

[time]
disabled = false
format = "[  $time ]($style)"
time_format = "%H:%M"
style = "fg:#4C566A"
