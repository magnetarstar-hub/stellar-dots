# ─────────────────────────────────────────────────────────────
# kitty.conf — Nordic clean-cyberpunk
# ─────────────────────────────────────────────────────────────

# ── Font ─────────────────────────────────────────────────────
font_family      NotoSansMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        11.0

disable_ligatures never
adjust_line_height  110%
adjust_column_width 0

# ── Shell ────────────────────────────────────────────────────
shell fish
shell_integration enabled

# ── Window / transparency / blur ────────────────────────────
background_opacity      0.90
dynamic_background_opacity yes
background_blur         32
window_padding_width     10
confirm_os_window_close  0

# rounded look is compositor-driven (Hyprland decoration.rounding),
# keep kitty borderless so the WM corners apply cleanly
hide_window_decorations yes

# ── Cursor ───────────────────────────────────────────────────
cursor_shape      beam
cursor_blink_interval 0.5
cursor_trail      1

# ── Scrollback ───────────────────────────────────────────────
scrollback_lines 10000
wheel_scroll_min_lines 1

# ── Tab bar ──────────────────────────────────────────────────
tab_bar_edge          bottom
tab_bar_style         powerline
tab_powerline_style   round
tab_bar_min_tabs      2

# ── Nord-derived color scheme ────────────────────────────────
foreground #E5E9F0
background #1B1E27
selection_foreground #1B1E27
selection_background #88C0D0

cursor            #88C0D0
cursor_text_color #1B1E27

url_color #88C0D0

# black
color0  #2E3440
color8  #4C566A

# red
color1  #BF616A
color9  #D08A91

# green
color2  #A3BE8C
color10 #B7CCA0

# yellow
color3  #EBCB8B
color11 #F0D9A8

# blue
color4  #81A1C1
color12 #97B4D3

# magenta / purple
color5  #B48EAD
color13 #C7A7C2

# cyan / teal
color6  #8FBCBB
color14 #A3D0CE

# white
color7  #E5E9F0
color15 #ECEFF4

# ── Window border colors (multiplexing) ─────────────────────
active_border_color   #88C0D0
inactive_border_color #3B4252
bell_border_color     #BF616A

# ── Misc ─────────────────────────────────────────────────────
enable_audio_bell no
window_margin_width 0
placement_strategy center
update_check_interval 0

# allow kitty to receive remote control from waybar/rofi scripts
allow_remote_control yes
