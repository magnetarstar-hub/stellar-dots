# Background transparency (0.0 = fully transparent, 1.0 = fully opaque)
background_opacity 0.8

# Make blur work (requires compositor support — Hyprland has this)
background_blur 20

# Optional: dim inactive windows
dim_opacity 0.75
# Background transparency (0.0 = fully transparent)
background_opacity 0.8
# Make blur work (requires compositor support — Hyprland, etc.)
background_blur 20
# Optional: dim inactive windows
dim_opacity 0.75

# Select all text and copy to clipboard
map ctrl+shift+a combine : select_all : copy_to_clipboard

# Shell_intergration no-cursor
cursor_trail 10
cursor_trail_start_threshold 0
cursor_trail_decay 0.01 0.05
cursor_shape block
cursor_blink true
